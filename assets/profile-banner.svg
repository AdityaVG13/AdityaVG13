<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="AdityaG: AI systems">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b3038"/>
      <stop offset="55%" stop-color="#343b46"/>
      <stop offset="100%" stop-color="#3d4450"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#552583" stop-opacity="0"/>
      <stop offset="40%" stop-color="#552583" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#7b3fa8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fdb927" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="12%" cy="78%" r="32%">
      <stop offset="0%" stop-color="#552583" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#552583" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="88%" cy="22%" r="28%">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4b5563" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <rect width="1200" height="280" fill="url(#glowLeft)"/>
  <rect width="1200" height="280" fill="url(#glowRight)"/>

  <path d="M 48 220 L 120 220" stroke="#552583" stroke-width="2" opacity="0.55" stroke-linecap="round"/>
  <path d="M 48 220 L 48 148" stroke="#552583" stroke-width="2" opacity="0.55" stroke-linecap="round"/>
  <path d="M 1152 60 L 1080 60" stroke="#64748b" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
  <path d="M 1152 60 L 1152 132" stroke="#64748b" stroke-width="2" opacity="0.45" stroke-linecap="round"/>

  <text x="600" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" fill="#e6edf3" letter-spacing="-0.03em">AdityaG</text>
  <text x="600" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="500" fill="#552583" letter-spacing="0.14em">BUILDING AI SYSTEMS</text>

  <rect x="330" y="276" width="540" height="3" fill="url(#accentBar)"/>

  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="600">
    <rect x="352" y="188" width="148" height="28" rx="14" fill="#343b46" stroke="#552583" stroke-width="1"/>
    <text x="426" y="206" text-anchor="middle" fill="#c4b5fd">agent memory</text>
    <rect x="516" y="188" width="118" height="28" rx="14" fill="#343b46" stroke="#64748b" stroke-width="1"/>
    <text x="575" y="206" text-anchor="middle" fill="#94a3b8">spec loops</text>
    <rect x="650" y="188" width="156" height="28" rx="14" fill="#343b46" stroke="#fdb927" stroke-width="1"/>
    <text x="728" y="206" text-anchor="middle" fill="#fdb927">model routing</text>
  </g>
</svg>
