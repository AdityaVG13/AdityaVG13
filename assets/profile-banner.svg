<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="AdityaG: AI systems">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15181d"/>
      <stop offset="50%" stop-color="#1a1f26"/>
      <stop offset="100%" stop-color="#262b33"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#57d6a3" stop-opacity="0"/>
      <stop offset="35%" stop-color="#57d6a3" stop-opacity="0.55"/>
      <stop offset="65%" stop-color="#87a7bd" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f2bc66" stop-opacity="0"/>
      <animate attributeName="x1" values="0%;20%;0%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;80%;100%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="18%" cy="72%" r="28%">
      <stop offset="0%" stop-color="#57d6a3" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#57d6a3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="82%" cy="28%" r="26%">
      <stop offset="0%" stop-color="#87a7bd" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#87a7bd" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <rect width="1200" height="280" fill="url(#glowLeft)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="280" fill="url(#glowRight)">
    <animate attributeName="opacity" values="0.65;1;0.65" dur="7s" repeatCount="indefinite"/>
  </rect>

  <g opacity="0.35">
    <path d="M 48 220 L 120 220" stroke="#57d6a3" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.55;0.2" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M 48 220 L 48 148" stroke="#57d6a3" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.55;0.2" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M 1152 60 L 1080 60" stroke="#87a7bd" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M 1152 60 L 1152 132" stroke="#87a7bd" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="600" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="700" fill="#57d6a3" letter-spacing="-0.03em">AdityaG</text>
  <text x="600" y="154" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="500" fill="#c9d1d9" letter-spacing="0.14em">BUILDING AI SYSTEMS</text>

  <rect x="360" y="276" width="480" height="3" fill="url(#accentBar)"/>

  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="600">
    <rect x="352" y="188" width="148" height="28" rx="14" fill="#262b33" stroke="#57d6a3" stroke-width="1"/>
    <text x="426" y="206" text-anchor="middle" fill="#57d6a3">agent memory</text>
    <rect x="516" y="188" width="118" height="28" rx="14" fill="#262b33" stroke="#87a7bd" stroke-width="1"/>
    <text x="575" y="206" text-anchor="middle" fill="#87a7bd">spec loops</text>
    <rect x="650" y="188" width="156" height="28" rx="14" fill="#262b33" stroke="#f2bc66" stroke-width="1"/>
    <text x="728" y="206" text-anchor="middle" fill="#f2bc66">model routing</text>
  </g>
</svg>
