<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AdityaVG13 repository map</title>
  <desc id="desc">A structured map of public work across local-first AI tools, inference infrastructure, and Minecraft modding.</desc>
  <style>
    :root {
      --bg: #101215;
      --panel: #171a1f;
      --panel-2: #1d2228;
      --line: #343b45;
      --text: #f2f5f7;
      --muted: #a8b0ba;
      --soft: #68717d;
      --green: #57d6a3;
      --amber: #f2bc66;
      --steel: #87a7bd;
    }

    .frame { fill: var(--bg); }
    .grain { opacity: 0.16; mix-blend-mode: screen; }
    .title { font: 700 58px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--text); letter-spacing: -1px; }
    .subtitle { font: 400 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--muted); }
    .mono { font: 600 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; letter-spacing: 0.4px; }
    .label { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; letter-spacing: 1.6px; text-transform: uppercase; }
    .node-title { font: 700 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--text); }
    .node-copy { font: 500 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--muted); }
    .tiny { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: var(--soft); }
    .panel { fill: var(--panel); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    .panel2 { fill: var(--panel-2); stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    .thread { stroke: var(--line); stroke-width: 2; stroke-linecap: round; }
    .thread-hot { stroke: var(--green); stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 7 12; animation: dash 12s linear infinite; }
    .pulse { animation: pulse 3.8s ease-in-out infinite; transform-origin: center; }
    .float-a { animation: floatA 7s ease-in-out infinite; }
    .float-b { animation: floatB 8.5s ease-in-out infinite; }
    .scan { animation: scan 8s ease-in-out infinite; opacity: 0.35; }

    @keyframes dash { to { stroke-dashoffset: -76; } }
    @keyframes pulse { 0%, 100% { opacity: 0.65; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
    @keyframes floatA { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes floatB { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
    @keyframes scan { 0%, 100% { transform: translateX(-24px); } 50% { transform: translateX(18px); } }

    @media (prefers-reduced-motion: reduce) {
      .thread-hot, .pulse, .float-a, .float-b, .scan { animation: none; }
    }
  </style>

  <rect class="frame" width="1200" height="560" rx="34"/>
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 110) rotate(44) scale(580 470)">
      <stop stop-color="#57d6a3" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#57d6a3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 450) rotate(124) scale(490 420)">
      <stop stop-color="#f2bc66" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#f2bc66" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <linearGradient id="scanline" x1="0" x2="1" y1="0" y2="0">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" rx="34" fill="url(#g1)"/>
  <rect width="1200" height="560" rx="34" fill="url(#g2)"/>
  <rect class="grain" width="1200" height="560" rx="34" filter="url(#noise)"/>

  <g opacity="0.28">
    <path d="M80 430C226 335 309 347 411 383C543 429 608 436 731 368C853 300 934 278 1118 326" stroke="#68717d" stroke-width="1"/>
    <path d="M74 155C223 203 328 177 444 132C570 83 690 81 815 128C917 166 1027 167 1128 116" stroke="#68717d" stroke-width="1"/>
  </g>

  <g transform="translate(68 70)">
    <text class="label" x="0" y="0" fill="#57d6a3">PUBLIC WORKBENCH</text>
    <text class="title" x="0" y="78">AdityaG</text>
    <text class="subtitle" x="2" y="118">AI tooling, local inference, and GTNH modding systems.</text>

    <g transform="translate(0 174)">
      <rect class="panel" x="0" y="0" width="470" height="188" rx="24"/>
      <path class="scan" d="M36 0H88V188H36Z" fill="url(#scanline)"/>
      <text class="label" x="32" y="44" fill="#f2bc66">CURRENT ARC</text>
      <text class="node-title" x="32" y="82">Local-first agent infrastructure</text>
      <text class="node-copy" x="32" y="116">Memory, context compression, workflow ratchets,</text>
      <text class="node-copy" x="32" y="140">and practical model routing for real coding loops.</text>
      <g transform="translate(32 158)">
        <circle class="pulse" cx="7" cy="7" r="7" fill="#57d6a3"/>
        <text class="tiny" x="24" y="12">cortex / gpr / Model-Switchboard / TweetKB</text>
      </g>
    </g>

    <g transform="translate(0 398)">
      <text class="mono" x="0" y="0" fill="#a8b0ba">github.com/AdityaVG13</text>
      <line x1="0" y1="24" x2="430" y2="24" stroke="#343b45" stroke-width="1"/>
      <text class="tiny" x="0" y="52">profile README generated from live repository metadata</text>
    </g>
  </g>

  <g transform="translate(610 58)">
    <rect class="panel" x="0" y="0" width="522" height="444" rx="30"/>

    <g transform="translate(38 36)">
      <text class="label" x="0" y="0" fill="#87a7bd">REPOSITORY SYSTEM MAP</text>
      <line class="thread-hot" x1="78" y1="73" x2="320" y2="73"/>
      <line class="thread" x1="78" y1="190" x2="320" y2="190"/>
      <line class="thread" x1="78" y1="307" x2="320" y2="307"/>

      <g class="float-a">
        <rect class="panel2" x="0" y="38" width="190" height="70" rx="18"/>
        <text class="node-title" x="22" y="68">Open source</text>
        <text class="node-copy" x="22" y="92">agent tools and data apps</text>
      </g>

      <g class="float-b">
        <rect class="panel2" x="256" y="38" width="202" height="70" rx="18"/>
        <text class="node-title" x="278" y="68">Cortex</text>
        <text class="node-copy" x="278" y="92">persistent AI memory</text>
      </g>

      <g class="float-b">
        <rect class="panel2" x="0" y="155" width="190" height="70" rx="18"/>
        <text class="node-title" x="22" y="185">Inference</text>
        <text class="node-copy" x="22" y="209">C++, Rust, Python forks</text>
      </g>

      <g class="float-a">
        <rect class="panel2" x="256" y="155" width="202" height="70" rx="18"/>
        <text class="node-title" x="278" y="185">rvllm / vllm</text>
        <text class="node-copy" x="278" y="209">serving engines and kernels</text>
      </g>

      <g class="float-a">
        <rect class="panel2" x="0" y="272" width="190" height="70" rx="18"/>
        <text class="node-title" x="22" y="302">Minecraft</text>
        <text class="node-copy" x="22" y="326">GTNH and 1.7.10 mods</text>
      </g>

      <g class="float-b">
        <rect class="panel2" x="256" y="272" width="202" height="70" rx="18"/>
        <text class="node-title" x="278" y="302">Twist-Stuff</text>
        <text class="node-copy" x="278" y="326">quest books and docs</text>
      </g>

      <g transform="translate(0 382)">
        <rect x="0" y="-26" width="458" height="1" fill="#343b45"/>
        <text class="tiny" x="0" y="0">Selected repos are grouped for fast reading.</text>
      </g>
    </g>
  </g>
</svg>
