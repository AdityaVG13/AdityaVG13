<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="AdityaG: local-first AI systems">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15181d"/>
      <stop offset="55%" stop-color="#1a1f26"/>
      <stop offset="100%" stop-color="#262b33"/>
    </linearGradient>
    <linearGradient id="mintGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#57d6a3" stop-opacity="0"/>
      <stop offset="50%" stop-color="#57d6a3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#57d6a3" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#30363d" stroke-width="0.6" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <rect x="0" y="276" width="1200" height="4" fill="url(#mintGlow)"/>

  <g opacity="0.9" filter="url(#softGlow)">
    <line x1="180" y1="170" x2="420" y2="110" stroke="#57d6a3" stroke-width="1.5" opacity="0.55"/>
    <line x1="420" y1="110" x2="660" y2="170" stroke="#87a7bd" stroke-width="1.5" opacity="0.5"/>
    <line x1="660" y1="170" x2="900" y2="110" stroke="#f2bc66" stroke-width="1.5" opacity="0.45"/>
    <circle cx="180" cy="170" r="7" fill="#57d6a3"/>
    <circle cx="420" cy="110" r="9" fill="#57d6a3"/>
    <circle cx="660" cy="170" r="7" fill="#87a7bd"/>
    <circle cx="900" cy="110" r="7" fill="#f2bc66"/>
  </g>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#8b949e" letter-spacing="0.04em">
    <text x="148" y="198">memory</text>
    <text x="388" y="88">cortex</text>
    <text x="628" y="198">gpr</text>
    <text x="852" y="88">routing</text>
  </g>

  <text x="600" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="56" font-weight="700" fill="#57d6a3" letter-spacing="-0.02em">AdityaG</text>
  <text x="600" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#c9d1d9" letter-spacing="0.12em">BUILDING LOCAL-FIRST AI SYSTEMS</text>

  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" font-weight="600">
    <rect x="318" y="188" width="148" height="28" rx="14" fill="#262b33" stroke="#57d6a3" stroke-width="1"/>
    <text x="392" y="206" text-anchor="middle" fill="#57d6a3">agent memory</text>
    <rect x="482" y="188" width="118" height="28" rx="14" fill="#262b33" stroke="#87a7bd" stroke-width="1"/>
    <text x="541" y="206" text-anchor="middle" fill="#87a7bd">spec loops</text>
    <rect x="616" y="188" width="156" height="28" rx="14" fill="#262b33" stroke="#f2bc66" stroke-width="1"/>
    <text x="694" y="206" text-anchor="middle" fill="#f2bc66">local inference</text>
  </g>
</svg>
